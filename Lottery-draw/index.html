<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Draw</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            background: linear-gradient(145deg, #fff0e0 0%, #ffd9b5 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }
        .card {
            max-width: 700px;
            width: 100%;
            background: rgba(255,245,235,0.98);
            border-radius: 48px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2), 0 4px 12px rgba(0,0,0,0.1);
            overflow: hidden;
            backdrop-filter: blur(2px);
        }
        .header {
            background: #d9a066;
            padding: 1rem 0.8rem;
            text-align: center;
            color: #4a2c1a;
        }
        .header h1 {
            margin: 0;
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            flex-wrap: nowrap;
            white-space: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0 4px;
        }
        .header p {
            margin: 0.5rem 0 0;
            opacity: 0.85;
            color: #4a2c1a;
            font-size: 0.8rem;
        }
        /* 基础图片样式（适用于 capy_sleep） */
        .header-img {
            width: 44px;
            height: 44px;
            object-fit: contain;
            border-radius: 12px;
            flex-shrink: 0;
            background-color: #d9a066;
        }
        /* 针对第一张图片（capy_coffee 1）单独放大，使其视觉主体与第二张一致 */
        .header-img:first-child {
            width: 52px;
            height: 52px;
            margin: -4px 0; /* 微调垂直居中 */
            object-fit: contain;
        }
        .content {
            padding: 1.5rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            align-items: flex-end;
        }
        .input-field {
            flex: 1;
            min-width: 90px;
        }
        .input-field label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #8b5a2b;
            margin-bottom: 4px;
        }
        .input-field input, .input-field textarea {
            width: 100%;
            padding: 8px 10px;
            border: 2px solid #e0c8a8;
            border-radius: 20px;
            font-size: 0.9rem;
            background: white;
            color: #4a2c1a;
        }
        .input-field input:focus, .input-field textarea:focus {
            outline: none;
            border-color: #d9a066;
            box-shadow: 0 0 0 3px rgba(217,160,102,0.2);
        }
        .exclude-text {
            resize: vertical;
            font-family: monospace;
        }
        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #fff3e6;
            padding: 6px 12px;
            border-radius: 40px;
            margin-bottom: 1.2rem;
            font-size: 0.85rem;
        }
        .checkbox-row label {
            font-weight: 600;
            color: #8b5a2b;
            cursor: pointer;
        }
        .stats {
            display: flex;
            gap: 1rem;
            background: #fff3e6;
            border-radius: 32px;
            padding: 0.8rem 1rem;
            margin-bottom: 1.5rem;
            justify-content: space-between;
        }
        .stat {
            text-align: center;
            flex: 1;
        }
        .stat-number {
            font-size: 1.8rem;
            font-weight: 800;
            color: #b87c4a;
            line-height: 1;
        }
        .stat-label {
            font-size: 0.7rem;
            color: #8b5a2b;
            font-weight: 500;
        }
        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }
        button {
            flex: 1;
            background: #d9a066;
            border: none;
            padding: 12px 0;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: 700;
            color: #4a2c1a;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        button:hover {
            background: #c28954;
            transform: scale(0.98);
        }
        .reset-btn {
            background: #c0a080;
            color: #4a2c1a;
        }
        .reset-btn:hover {
            background: #a88662;
        }
        .result-area {
            background: #fff3e6;
            border-radius: 32px;
            padding: 1rem;
            margin-top: 0.8rem;
            border: 1px solid #e0c8a8;
        }
        .draw-result {
            background: #ffffff;
            border-radius: 28px;
            padding: 16px;
            margin-bottom: 1rem;
            box-shadow: inset 0 1px 3px #0001, 0 2px 4px #fff9;
            min-height: 80px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .result-number {
            background: #d9a066;
            color: #4a2c1a;
            font-size: 1.5rem;
            font-weight: 800;
            padding: 8px 16px;
            border-radius: 60px;
            display: inline-block;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            min-width: 70px;
            text-align: center;
        }
        .result-number.single {
            font-size: 2rem;
            padding: 12px 24px;
        }
        .history-title {
            font-weight: 700;
            margin: 0 0 6px 0;
            color: #b87c4a;
            font-size: 0.9rem;
        }
        .history-list {
            background: white;
            border-radius: 28px;
            padding: 8px 12px;
            min-height: 60px;
            max-height: 120px;
            overflow-y: auto;
            font-size: 0.85rem;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            align-items: center;
        }
        .history-badge {
            background: #e9ecef;
            padding: 4px 10px;
            border-radius: 30px;
            font-weight: 600;
            color: #8b5a2b;
        }
        .error-msg {
            color: #c7362b;
            background: #ffe8e6;
            padding: 6px 12px;
            border-radius: 30px;
            margin-top: 10px;
            font-size: 0.8rem;
            text-align: center;
        }
        footer {
            font-size: 0.65rem;
            text-align: center;
            color: #b87c4a;
            margin-top: 1rem;
        }
        /* 手机窄屏优化 */
        @media (max-width: 550px) {
            .content { padding: 1rem; }
            .header h1 {
                font-size: 1.3rem;
                gap: 6px;
            }
            .header-img {
                width: 36px;
                height: 36px;
            }
            /* 手机版第一张图片也相应放大 */
            .header-img:first-child {
                width: 42px;
                height: 42px;
                margin: -3px 0;
            }
            .stat-number {
                font-size: 1.5rem;
            }
            .result-number {
                font-size: 1.2rem;
                padding: 6px 12px;
                min-width: 55px;
            }
            .result-number.single {
                font-size: 1.6rem;
                padding: 10px 20px;
            }
            .input-field {
                min-width: 75px;
            }
            .input-field input, .input-field textarea {
                padding: 6px 8px;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
<div class="card">
    <div class="header">
        <h1>
            <img class="header-img" src="capy_coffee%201.png" alt="capybara with coffee">
            <span>Draw</span>
            <img class="header-img" src="capy_sleep.png" alt="capybara sleeping">
        </h1>
        <p>Non‑repeating · Exclude numbers · Sorted results</p>
    </div>
    <div class="content">
        <div class="input-group">
            <div class="input-field">
                <label>Min</label>
                <input type="number" id="minNum" value="1" step="1">
            </div>
            <div class="input-field">
                <label>Max</label>
                <input type="number" id="maxNum" value="100" step="1">
            </div>
            <div class="input-field">
                <label>Draw count</label>
                <input type="number" id="drawCount" value="1" min="1" step="1">
            </div>
        </div>

        <div class="input-field" style="margin-bottom: 1rem;">
            <label>Exclude numbers (comma separated)</label>
            <textarea id="excludeNumbers" rows="2" class="exclude-text" placeholder="e.g., 1, 13, 50"></textarea>
        </div>

        <div class="checkbox-row">
            <input type="checkbox" id="uniqueMode" checked>
            <label>Non‑repeating mode (drawn numbers won't reappear)</label>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-number" id="drawnCount">0</div>
                <div class="stat-label">Drawn count</div>
            </div>
            <div class="stat">
                <div class="stat-number" id="remainingCount">0</div>
                <div class="stat-label">Remaining</div>
            </div>
        </div>

        <div class="button-group">
            <button id="drawBtn">Draw</button>
            <button id="resetBtn" class="reset-btn">Reset</button>
        </div>

        <div class="result-area">
            <div class="draw-result" id="drawResult">
                <span style="color:#b87c4a;">— Waiting —</span>
            </div>
            <div class="history-title">Drawn numbers (in order drawn)</div>
            <div class="history-list" id="historyList">No records yet</div>
            <div id="errorMsg" class="error-msg" style="display: none;"></div>
        </div>
        <footer>Adjust range, exclude numbers, reset to start over</footer>
    </div>
</div>

<script>
    // 抽签逻辑（完整）
    let currentPool = [];
    let drawnNumbers = [];
    let lastExcludeStr = "";
    let lastMin = 1, lastMax = 100;
    
    const minInput = document.getElementById('minNum');
    const maxInput = document.getElementById('maxNum');
    const drawCountInput = document.getElementById('drawCount');
    const excludeTextarea = document.getElementById('excludeNumbers');
    const uniqueCheck = document.getElementById('uniqueMode');
    const drawnCountSpan = document.getElementById('drawnCount');
    const remainingSpan = document.getElementById('remainingCount');
    const drawResultDiv = document.getElementById('drawResult');
    const historyListDiv = document.getElementById('historyList');
    const errorMsgDiv = document.getElementById('errorMsg');
    const drawBtn = document.getElementById('drawBtn');
    const resetBtn = document.getElementById('resetBtn');
    
    function showError(msg) {
        errorMsgDiv.textContent = msg;
        errorMsgDiv.style.display = 'block';
        setTimeout(() => {
            errorMsgDiv.style.display = 'none';
        }, 2800);
    }
    
    function parseExcludeNumbers(str) {
        if (!str.trim()) return [];
        const parts = str.split(',').map(s => s.trim()).filter(s => s !== '');
        const nums = [];
        for (let part of parts) {
            const num = Number(part);
            if (!isNaN(num) && Number.isInteger(num)) {
                nums.push(num);
            }
        }
        return nums;
    }
    
    function rebuildPool() {
        let min = parseInt(minInput.value, 10);
        let max = parseInt(maxInput.value, 10);
        if (isNaN(min)) min = 1;
        if (isNaN(max)) max = 100;
        if (min > max) { [min, max] = [max, min]; }
        minInput.value = min;
        maxInput.value = max;
        
        const excludeArr = parseExcludeNumbers(excludeTextarea.value);
        const unique = uniqueCheck.checked;
        
        let fullPool = [];
        for (let i = min; i <= max; i++) fullPool.push(i);
        let filtered = fullPool.filter(num => !excludeArr.includes(num));
        if (unique) {
            filtered = filtered.filter(num => !drawnNumbers.includes(num));
        }
        currentPool = filtered;
        updateStats();
    }
    
    function updateStats() {
        const drawnLen = drawnNumbers.length;
        drawnCountSpan.innerText = drawnLen;
        remainingSpan.innerText = currentPool.length;
        
        if (drawnNumbers.length === 0) {
            historyListDiv.innerHTML = '<span style="color:#b87c4a;">No records yet</span>';
        } else {
            historyListDiv.innerHTML = drawnNumbers.map(num => `<span class="history-badge">${num}</span>`).join('');
        }
    }
    
    function displayDrawResult(resultsArray) {
        if (!resultsArray || resultsArray.length === 0) {
            drawResultDiv.innerHTML = '<span style="color:#b87c4a;">No numbers available</span>';
            return;
        }
        const sorted = [...resultsArray].sort((a,b) => a - b);
        const cardsHtml = sorted.map(num => `<div class="result-number ${sorted.length === 1 ? 'single' : ''}">${num}</div>`).join('');
        drawResultDiv.innerHTML = cardsHtml;
    }
    
    function performDraw() {
        rebuildPool();
        let drawNum = parseInt(drawCountInput.value, 10);
        if (isNaN(drawNum) || drawNum < 1) drawNum = 1;
        
        if (currentPool.length === 0) {
            showError('No numbers available. Adjust range, exclusions, or reset.');
            drawResultDiv.innerHTML = '<span style="color:#b87c4a;">No draws left</span>';
            return;
        }
        
        if (drawNum > currentPool.length) {
            showError(`Draw count (${drawNum}) exceeds remaining (${currentPool.length}). Drawing ${currentPool.length} number(s).`);
            drawNum = currentPool.length;
        }
        
        const shuffled = [...currentPool];
        for (let i = shuffled.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
        }
        const selected = shuffled.slice(0, drawNum);
        
        if (selected.length === 0) {
            drawResultDiv.innerHTML = '<span style="color:#b87c4a;">No result</span>';
            return;
        }
        
        const unique = uniqueCheck.checked;
        if (unique) {
            for (let val of selected) {
                if (!drawnNumbers.includes(val)) {
                    drawnNumbers.push(val);
                }
            }
        } else {
            for (let val of selected) {
                drawnNumbers.push(val);
            }
        }
        
        displayDrawResult(selected);
        rebuildPool();
        if (errorMsgDiv.style.display === 'block') errorMsgDiv.style.display = 'none';
    }
    
    function resetDraw() {
        drawnNumbers = [];
        rebuildPool();
        drawResultDiv.innerHTML = '<span style="color:#b87c4a;">— Waiting —</span>';
        updateStats();
        errorMsgDiv.style.display = 'none';
    }
    
    function onSettingsChanged() {
        const newExclude = excludeTextarea.value;
        const newMin = parseInt(minInput.value, 10);
        const newMax = parseInt(maxInput.value, 10);
        if (newMin !== lastMin || newMax !== lastMax || newExclude !== lastExcludeStr) {
            drawnNumbers = [];
            lastMin = newMin;
            lastMax = newMax;
            lastExcludeStr = newExclude;
            rebuildPool();
            drawResultDiv.innerHTML = '<span style="color:#b87c4a;">— Reset —</span>';
            updateStats();
            errorMsgDiv.style.display = 'none';
        } else {
            rebuildPool();
        }
    }
    
    function bindEvents() {
        drawBtn.addEventListener('click', () => performDraw());
        resetBtn.addEventListener('click', () => resetDraw());
        minInput.addEventListener('input', () => {
            drawnNumbers = [];
            onSettingsChanged();
        });
        maxInput.addEventListener('input', () => {
            drawnNumbers = [];
            onSettingsChanged();
        });
        excludeTextarea.addEventListener('input', () => {
            drawnNumbers = [];
            onSettingsChanged();
        });
        uniqueCheck.addEventListener('change', () => {
            drawnNumbers = [];
            onSettingsChanged();
        });
    }
    
    function init() {
        lastMin = parseInt(minInput.value,10);
        lastMax = parseInt(maxInput.value,10);
        lastExcludeStr = excludeTextarea.value;
        drawnNumbers = [];
        rebuildPool();
        bindEvents();
        updateStats();
        drawResultDiv.innerHTML = '<span style="color:#b87c4a;">— Waiting —</span>';
    }
    
    init();
</script>
</body>
</html>
